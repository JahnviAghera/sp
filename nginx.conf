upstream speakspace_backend {
    least_conn; # Route to the server with fewest active connections
    server backend:4000;
    server backend:4000; # Will scale with docker compose --scale
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip compression for faster responses
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Load balance API requests to backend
    location /api/ {
        proxy_pass http://speakspace_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket support for Socket.io (real-time sessions)
    location /socket.io/ {
        proxy_pass http://speakspace_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://speakspace_backend;
    }
}
