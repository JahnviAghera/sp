version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: .
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/speakspace
      - JWT_SECRET=jungkookjeon
      - GEMINI_API_KEY=AIzaSyDOkXWE-tucx3r-lIBx4ybO0UrQTlIWtMU
      - PORT=4000
    depends_on:
      - mongodb
    restart: always
    deploy:
      replicas: 2  # 2 backend instances for load balancing

  # Load Balancer (Nginx) + Frontend Static Server
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

  # Real-time Monitoring Dashboard
  monitoring:
    image: amir20/dozzle:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

volumes:
  mongodb_data:

networks:
  default:
    name: speakspace-network
