version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: .
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/speakspace
      - JWT_SECRET=jungkookjeon
      - GEMINI_API_KEY=AIzaSyDOkXWE-tucx3r-lIBx4ybO0UrQTlIWtMU
      - PORT=4000
    depends_on:
      - mongodb
    restart: always
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: always

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  monitoring:
    image: amir20/dozzle:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always

volumes:
  mongodb_data:

networks:
  default:
    name: speakspace-network
